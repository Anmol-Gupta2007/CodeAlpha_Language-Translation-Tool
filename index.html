```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Translation Tool</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:#fff;
    width:800px;
    max-width:100%;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:130px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    resize:none;
    font-size:16px;
}

.language-box{
    display:flex;
    gap:15px;
    margin:15px 0;
}

.language-box div{
    flex:1;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#444;
}

select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.translate-btn{
    background:#007bff;
    color:white;
}

.translate-btn:hover{
    background:#0056b3;
}

.copy-btn{
    background:#28a745;
    color:white;
}

.copy-btn:hover{
    background:#1e7e34;
}

.speak-btn{
    background:#ff9800;
    color:white;
}

.speak-btn:hover{
    background:#e68900;
}

.output-section{
    margin-top:20px;
}
</style>
</head>
<body>

<div class="container">
    <h1>🌐 Language Translation Tool</h1>

    <label>Enter Text</label>
    <textarea id="inputText" placeholder="Type text here..."></textarea>

    <div class="language-box">
        <div>
            <label>Source Language</label>
            <select id="sourceLang"></select>
        </div>

        <div>
            <label>Target Language</label>
            <select id="targetLang"></select>
        </div>
    </div>

    <button class="translate-btn" onclick="translateText()">
        Translate
    </button>

    <div class="output-section">
        <label>Translated Text</label>
        <textarea id="outputText" readonly placeholder="Translation will appear here..."></textarea>

        <button class="copy-btn" onclick="copyText()">
            Copy Translation
        </button>

        <button class="speak-btn" onclick="speakText()">
            🔊 Text To Speech
        </button>
    </div>
</div>

<script>

// 50+ Languages
const languages = {
    "auto":"Auto Detect",
    "af":"Afrikaans",
    "sq":"Albanian",
    "ar":"Arabic",
    "hy":"Armenian",
    "az":"Azerbaijani",
    "eu":"Basque",
    "bn":"Bengali",
    "bg":"Bulgarian",
    "ca":"Catalan",
    "zh-CN":"Chinese (Simplified)",
    "zh-TW":"Chinese (Traditional)",
    "hr":"Croatian",
    "cs":"Czech",
    "da":"Danish",
    "nl":"Dutch",
    "en":"English",
    "eo":"Esperanto",
    "et":"Estonian",
    "fi":"Finnish",
    "fr":"French",
    "gl":"Galician",
    "ka":"Georgian",
    "de":"German",
    "el":"Greek",
    "gu":"Gujarati",
    "ht":"Haitian Creole",
    "he":"Hebrew",
    "hi":"Hindi",
    "hu":"Hungarian",
    "is":"Icelandic",
    "id":"Indonesian",
    "ga":"Irish",
    "it":"Italian",
    "ja":"Japanese",
    "kn":"Kannada",
    "ko":"Korean",
    "la":"Latin",
    "lv":"Latvian",
    "lt":"Lithuanian",
    "mk":"Macedonian",
    "ms":"Malay",
    "ml":"Malayalam",
    "mt":"Maltese",
    "mr":"Marathi",
    "ne":"Nepali",
    "no":"Norwegian",
    "fa":"Persian",
    "pl":"Polish",
    "pt":"Portuguese",
    "pa":"Punjabi",
    "ro":"Romanian",
    "ru":"Russian",
    "sr":"Serbian",
    "sk":"Slovak",
    "sl":"Slovenian",
    "es":"Spanish",
    "sw":"Swahili",
    "sv":"Swedish",
    "ta":"Tamil",
    "te":"Telugu",
    "th":"Thai",
    "tr":"Turkish",
    "uk":"Ukrainian",
    "ur":"Urdu",
    "vi":"Vietnamese",
    "cy":"Welsh"
};

const sourceLang = document.getElementById("sourceLang");
const targetLang = document.getElementById("targetLang");

// Populate Languages
for(const code in languages){

    const sourceOption = document.createElement("option");
    sourceOption.value = code;
    sourceOption.textContent = languages[code];
    sourceLang.appendChild(sourceOption);

    if(code !== "auto"){
        const targetOption = document.createElement("option");
        targetOption.value = code;
        targetOption.textContent = languages[code];
        targetLang.appendChild(targetOption);
    }
}

sourceLang.value = "en";
targetLang.value = "hi";

// Translation Function
async function translateText(){

    const text = document.getElementById("inputText").value.trim();

    if(text === ""){
        alert("Please enter some text.");
        return;
    }

    const source = sourceLang.value;
    const target = targetLang.value;

    try{

        const url =
        `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${source}&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;

        const response = await fetch(url);
        const data = await response.json();

        let translatedText = "";

        data[0].forEach(item => {
            translatedText += item[0];
        });

        document.getElementById("outputText").value = translatedText;

    }catch(error){
        console.error(error);
        alert("Translation failed. Please try again.");
    }
}

// Copy Function
function copyText(){

    const text = document.getElementById("outputText").value;

    if(text === ""){
        alert("Nothing to copy.");
        return;
    }

    navigator.clipboard.writeText(text);

    alert("Translation copied successfully!");
}

// Text To Speech
function speakText(){

    const text = document.getElementById("outputText").value;

    if(text === ""){
        alert("No translated text available.");
        return;
    }

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = targetLang.value;

    window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
