<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Language Translator</title>
    <style>
        :root {
            --primary: #4a90e2;
            --primary-dark: #357abd;
            --secondary: #f5f7fa;
            --text-dark: #333;
            --text-light: #666;
            --border: #ddd;
            --success: #28a745;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1000px;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        .translation-grid {
            display: grid;
            grid-template-columns: 1fr 70px 1fr;
            gap: 20px;
            align-items: start;
        }

        @media (max-width: 800px) {
            .translation-grid {
                grid-template-columns: 1fr;
            }
        }

        .box {
            display: flex;
            flex-direction: column;
        }

        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        select {
            padding: 10px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--white);
            font-size: 0.95rem;
            color: var(--text-dark);
            cursor: pointer;
            min-width: 180px;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            width: 100%;
            min-height: 220px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .controls-column {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding-top: 40px;
        }

        .btn-main {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-main:hover {
            transform: scale(1.1);
        }

        .btn-main:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-swap {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--secondary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-swap:hover {
            background: #e0e0e0;
        }

        .btn-small {
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-small:hover {
            background: #e0e0e0;
            border-color: var(--primary);
        }

        .action-row {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }

        .message.error {
            display: block;
            background: #ffeaa7;
            color: #d63031;
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
        }

        .char-info {
            font-size: 0.8rem;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌐 Professional Language Translator</h1>
    
    <div class="message" id="message"></div>

    <div class="translation-grid">
        
        <!-- Left Box -->
        <div class="box">
            <div class="box-header">
                <label>From Language</label>
                <select id="sourceLang">
                    <option value="auto">Auto Detect</option>
                    <option value="en" selected>English</option>
                    <option value="hi">Hindi</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="zh">Chinese</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="ar">Arabic</option>
                    <option value="tr">Turkish</option>
                    <option value="nl">Dutch</option>
                    <option value="pl">Polish</option>
                    <option value="vi">Vietnamese</option>
                    <option value="th">Thai</option>
                    <option value="id">Indonesian</option>
                    <option value="uk">Ukrainian</option>
                    <option value="cs">Czech</option>
                    <option value="el">Greek</option>
                    <option value="he">Hebrew</option>
                    <option value="sv">Swedish</option>
                    <option value="da">Danish</option>
                    <option value="fi">Finnish</option>
                    <option value="no">Norwegian</option>
                    <option value="hu">Hungarian</option>
                    <option value="ro">Romanian</option>
                    <option value="bn">Bengali</option>
                    <option value="ur">Urdu</option>
                    <option value="ta">Tamil</option>
                    <option value="te">Telugu</option>
                    <option value="ml">Malayalam</option>
                    <option value="gu">Gujarati</option>
                    <option value="kn">Kannada</option>
                    <option value="pa">Punjabi</option>
                </select>
            </div>
            <textarea id="inputText" placeholder="Enter text here..."></textarea>
            <div class="char-info" id="charCount">0 characters</div>
        </div>

        <!-- Middle Controls -->
        <div class="controls-column">
            <div class="loader" id="loader"></div>
            <button class="btn-main" id="translateBtn">➜</button>
            <button class="btn-swap" id="swapBtn" title="Swap">⇄</button>
        </div>

        <!-- Right Box -->
        <div class="box">
            <div class="box-header">
                <label>To Language</label>
                <select id="targetLang">
                    <option value="hi" selected>Hindi</option>
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="zh">Chinese</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="ar">Arabic</option>
                    <option value="tr">Turkish</option>
                    <option value="nl">Dutch</option>
                    <option value="pl">Polish</option>
                    <option value="vi">Vietnamese</option>
                    <option value="th">Thai</option>
                    <option value="id">Indonesian</option>
                    <option value="uk">Ukrainian</option>
                    <option value="cs">Czech</option>
                    <option value="el">Greek</option>
                    <option value="he">Hebrew</option>
                    <option value="sv">Swedish</option>
                    <option value="da">Danish</option>
                    <option value="fi">Finnish</option>
                    <option value="no">Norwegian</option>
                    <option value="hu">Hungarian</option>
                    <option value="ro">Romanian</option>
                    <option value="bn">Bengali</option>
                    <option value="ur">Urdu</option>
                    <option value="ta">Tamil</option>
                    <option value="te">Telugu</option>
                    <option value="ml">Malayalam</option>
                    <option value="gu">Gujarati</option>
                    <option value="kn">Kannada</option>
                    <option value="pa">Punjabi</option>
                </select>
            </div>
            <textarea id="outputText" readonly placeholder="Translation will appear here..."></textarea>
            <div class="action-row">
                <button class="btn-small" id="copyBtn">📋 Copy</button>
                <button class="btn-small" id="speakBtn">🔊 Listen</button>
            </div>
        </div>
    </div>
</div>

<script>
    // DOM Elements
    const inputText = document.getElementById('inputText');
    const outputText = document.getElementById('outputText');
    const sourceLang = document.getElementById('sourceLang');
    const targetLang = document.getElementById('targetLang');
    const translateBtn = document.getElementById('translateBtn');
    const loader = document.getElementById('loader');
    const swapBtn = document.getElementById('swapBtn');
    const copyBtn = document.getElementById('copyBtn');
    const speakBtn = document.getElementById('speakBtn');
    const message = document.getElementById('message');
    const charCount = document.getElementById('charCount');

    // Update character count
    inputText.addEventListener('input', () => {
        charCount.textContent = inputText.value.length + ' characters';
    });

    // Show message function
    function showMessage(text, type) {
        message.textContent = text;
        message.className = 'message ' + type;
        setTimeout(() => {
            message.style.display = 'none';
        }, 4000);
    }

    // Translate Function using MyMemory API
    async function translate() {
        const text = inputText.value.trim();
        let source = sourceLang.value;
        const target = targetLang.value;

        if (!text) {
            showMessage('Please enter some text to translate', 'error');
            return;
        }

        // Loading state
        outputText.value = 'Translating...';
        translateBtn.disabled = true;
        loader.style.display = 'block';
        message.style.display = 'none';

        try {
            // For Auto Detect, we use 'en' as source for the API
            let sourceCode = source === 'auto' ? 'en' : source;
            let targetCode = target;

            // MyMemory API URL
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceCode}|${targetCode}`;

            const response = await fetch(url);
            const data = await response.json();

            if (data.responseStatus === 200 && data.responseData) {
                outputText.value = data.responseData.translatedText;
                showMessage('Translation successful!', 'success');
            } else {
                outputText.value = '';
                showMessage('Translation failed. Please try again.', 'error');
            }

        } catch (error) {
            console.error(error);
            outputText.value = '';
            showMessage('Network error. Please check your internet.', 'error');
        } finally {
            translateBtn.disabled = false;
            loader.style.display = 'none';
        }
    }

    // Swap Languages
    swapBtn.addEventListener('click', () => {
        const tempLang = sourceLang.value;
        sourceLang.value = targetLang.value;
        targetLang.value = tempLang;

        const tempText = inputText.value;
        inputText.value = outputText.value;
        outputText.value = tempText;

        showMessage('Languages swapped!', 'success');
    });

    // Copy to Clipboard
    copyBtn.addEventListener('click', () => {
        if (!outputText.value) return;
        
        navigator.clipboard.writeText(outputText.value).then(() => {
            copyBtn.textContent = '✓ Copied';
            setTimeout(() => copyBtn.textContent = '📋 Copy', 1500);
        });
    });

    // Text to Speech
    speakBtn.addEventListener('click', () => {
        if (!outputText.value) return;

        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(outputText.value);
        
        const voices = window.speechSynthesis.getVoices();
        const targetCode = targetLang.value;
        const voiceLang = targetCode.split('-')[0];
        
        const voice = voices.find(v => v.lang.startsWith(voiceLang));
        if (voice) {
            utterance.voice = voice;
            utterance.lang = voice.lang;
        }

        window.speechSynthesis.speak(utterance);
    });

    // Event Listeners
    translateBtn.addEventListener('click', translate);
    
    // Allow pressing Enter to translate (Ctrl+Enter)
    inputText.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            translate();
        }
    });

    // Load voices
    window.speechSynthesis.onvoiceschanged = () => {};

</script>

</body>
</html>
